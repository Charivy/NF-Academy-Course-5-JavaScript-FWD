<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penugasan JS 1</title>
</head>
<body>
    <p style="font-weight: bold; text-align: center;">Penugasan 1 Javascript - Menghitung Luas</p>
    <br>
    <script>
        let s = 5; // sisi
        let p = 10; // panjang
        let l = 7; // lebar
        let a = 6; // alaas
        let t = 8; // tinggi
        const segi3 = 1/2;

        // Luas Persegi Panjang (p * l)
        document.write("Diketahui suatu persegi panjang memiliki panjang: " + p + "cm" + " dan memiliki lebar: " + l + "cm" + "<br>");
        document.write("Luas persegi panjang tersebut adalah: " + p*l + "cm" + "<hr>");

        // Luas Bujur Sangkar (s * s)
        document.write("Diketahui suatu bujur sangkar atau persegi memiliki sisi: " + s + "cm" + "<br>");
        document.write("Luas bujur sangkar adalah: " + s*s + "cm" + "<hr>");

        // Luas Segi Tiga (1/2(segi3) * a * t)
        document.write("Diketahui suatu segitiga memiliki alas: " + a + "cm" + " dan memiliki tinggi: " + t + "cm" + "<br>");
        document.write("Luas segitiga tersebut adalah: " + segi3 * a * t + "cm" + "<hr>");
    </script>
</body>
</html>
